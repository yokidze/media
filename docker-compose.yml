version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: polytech-media-postgres
    restart: unless-stopped
    profiles: ['local-db']
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-polytech_media_archive}
      POSTGRES_USER: ${POSTGRES_USER:-archive_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-archive_password}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-archive_user} -d ${POSTGRES_DB:-polytech_media_archive}']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: polytech-media-minio
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minio}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-miniosecret}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-02-21T16-00-46Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY_ID:-minio} ${S3_SECRET_ACCESS_KEY:-miniosecret};
      mc mb -p local/${S3_BUCKET:-polytech-media-archive} || true;
      exit 0;
      "

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: polytech-media-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4000
      APP_ORIGIN: http://localhost
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_DATABASE_URL: ${DIRECT_DATABASE_URL:-}
      STORAGE_LOCAL_ROOT: ../../storage
      INTERNAL_API_BASE: http://api:4000/api/v1
    depends_on:
      minio-init:
        condition: service_completed_successfully
    ports:
      - '4000:4000'
    volumes:
      - ./storage:/app/storage

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: polytech-media-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_PROXY_TARGET: http://api:4000
      INTERNAL_API_BASE: http://api:4000/api/v1
    depends_on:
      - api
    ports:
      - '80:80'

volumes:
  postgres_data:
  minio_data:
