version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: polytech-media-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-polytech_media_archive}
      POSTGRES_USER: ${POSTGRES_USER:-archive_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-archive_user} -d ${POSTGRES_DB:-polytech_media_archive}']
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: polytech-media-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_DATABASE_URL: ${DIRECT_DATABASE_URL:-}
      STORAGE_DRIVER: LOCAL
      STORAGE_LOCAL_ROOT: ../../storage
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '4000:4000'
    volumes:
      - ./storage:/app/storage

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: polytech-media-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_PROXY_TARGET: http://api:4000
      INTERNAL_API_BASE: http://api:4000/api/v1
    depends_on:
      - api
    ports:
      - '80:80'

volumes:
  postgres_data:
